stages:
  - validate
  - test
  - build

validate-job:
  stage: validate
  image: node:20-alpine

  script:
    - node --version
    - npm --version

test-job:
  stage: test
  image: node:20-alpine

  script:
    - cd app
    - npm ci
    - npm test

build-job:
  stage: build
  image: node:20-alpine

  script:
    - cd app
    - npm ci
    - echo "Application build completed"
